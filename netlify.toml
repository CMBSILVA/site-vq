[build]
  publish = "."

# Desativa processamento que causa redirecionamentos extras
[build.processing]
  skip_processing = false

[build.processing.html]
  pretty_urls = false

# Headers de segurança e cache
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

[[headers]]
  for = "/styles.css"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/main.js"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Redireciona versões sem trailing slash para com trailing slash (301)
# Isso evita conteúdo duplicado e alinha com a estrutura de pastas
[[redirects]]
  from = "/servicos"
  to = "/servicos/"
  status = 301
  force = true

[[redirects]]
  from = "/processo"
  to = "/processo/"
  status = 301
  force = true

[[redirects]]
  from = "/contato"
  to = "/contato/"
  status = 301
  force = true
